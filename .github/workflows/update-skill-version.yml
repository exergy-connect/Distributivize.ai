name: Update skill version

on:
  push:
    branches:
      - main
    paths:
      - skills/distributivize/SKILL.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Populate latest version marker
        run: |
          set -euo pipefail

          COMMIT_TIME="$(git show -s --format=%cI "$GITHUB_SHA")"
          VERSION="$(date -u -d "$COMMIT_TIME" +'%Y-%m-%dT%H:%M:%S').$GITHUB_SHA"

          printf '%s\n' "$VERSION" > latest
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Commit latest version marker
        run: |
          set -euo pipefail

          if git diff --quiet -- latest; then
            echo "latest is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest
          git commit -m "Update distributivize skill version"
          git push
